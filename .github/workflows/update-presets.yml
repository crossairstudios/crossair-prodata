name: Auto-Update Crosshair Presets

on:
  schedule:
    # Führt das Skript jeden Sonntag um 00:00 Uhr vollautomatisch aus
    - cron: '0 0 * * *'
  workflow_dispatch: # Erlaubt es dir, das Update jederzeit manuell per Knopfdruck zu starten

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit GitHub Actions die presets.json überschreiben darf
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Scraper Dependencies
        run: npm install axios cheerio

      - name: Run Scraper Script
        run: node scraper.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "CrosshairBot"
          git config --global user.email "bot@crossairstudios.com"
          git add presets.json
          git diff --quiet && git diff --cached --quiet || (git commit -m "Auto-Update: Pro Crosshairs aktualisiert" && git push)
